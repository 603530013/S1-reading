<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英文複習樂園</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Baloo+2:wght@700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Nunito',sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#1e3a5f 0%,#0f766e 50%,#15803d 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px 16px;overflow:hidden;position:relative;
}
body::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M0 0h40v40H0zm40 40h40v40H40z'/%3E%3C/g%3E%3C/svg%3E");
}
/* Floating stars */
.star{position:fixed;color:rgba(255,255,255,.15);font-size:1.4em;animation:twinkle 4s ease-in-out infinite;pointer-events:none}
@keyframes twinkle{0%,100%{opacity:.1;transform:scale(1)}50%{opacity:.4;transform:scale(1.3)}}

.container{position:relative;z-index:1;width:100%;max-width:480px;text-align:center}
.logo{font-size:3.5em;margin-bottom:8px;animation:bounce .8s ease}
@keyframes bounce{0%{transform:scale(0)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
h1{font-family:'Baloo 2',cursive;font-size:2.4em;color:white;text-shadow:0 3px 12px rgba(0,0,0,.3);margin-bottom:6px}
.sub{color:rgba(255,255,255,.75);font-size:.97em;margin-bottom:36px}

.cards{display:flex;flex-direction:column;gap:14px}
.card{
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(10px);
  border:1.5px solid rgba(255,255,255,.25);
  border-radius:22px;padding:22px 26px;
  cursor:pointer;text-decoration:none;
  display:flex;align-items:center;gap:18px;
  transition:transform .25s,background .25s,box-shadow .25s;
  color:white;
}
.card:hover{
  transform:translateY(-4px) scale(1.02);
  background:rgba(255,255,255,.22);
  box-shadow:0 12px 32px rgba(0,0,0,.25);
}
.card .ci{font-size:2.8em;flex-shrink:0}
.card .ct{text-align:left}
.card .cn{font-family:'Baloo 2',cursive;font-size:1.25em;font-weight:800}
.card .cd{font-size:.82em;opacity:.78;margin-top:2px}

.ff-card{background:linear-gradient(135deg,rgba(22,163,74,.5),rgba(21,128,61,.4));border-color:rgba(134,239,172,.35)}
.ff-card:hover{background:linear-gradient(135deg,rgba(22,163,74,.7),rgba(21,128,61,.6))}
.rd-card{background:linear-gradient(135deg,rgba(3,105,161,.5),rgba(2,132,199,.4));border-color:rgba(147,197,253,.35)}
.rd-card:hover{background:linear-gradient(135deg,rgba(3,105,161,.7),rgba(2,132,199,.6))}
.gr-card{background:linear-gradient(135deg,rgba(192,38,211,.5),rgba(162,28,175,.4));border-color:rgba(240,171,252,.35)}
.gr-card:hover{background:linear-gradient(135deg,rgba(192,38,211,.7),rgba(162,28,175,.6))}
.mt-card{background:linear-gradient(135deg,rgba(251,146,60,.55),rgba(234,88,12,.45));border-color:rgba(253,186,116,.45)}
.mt-card:hover{background:linear-gradient(135deg,rgba(251,146,60,.75),rgba(234,88,12,.65))}
.mt-card .cn{display:flex;align-items:center;gap:6px}
.mt-badge{background:#fef3c7;color:#92400e;font-size:.55em;padding:2px 8px;border-radius:10px;font-weight:800;letter-spacing:.5px}

.footer{margin-top:28px;color:rgba(255,255,255,.4);font-size:.8em}
</style>
</head>
<body>
<span class="star" style="top:8%;left:6%;animation-delay:0s">⭐</span>
<span class="star" style="top:15%;right:8%;animation-delay:.8s">✨</span>
<span class="star" style="top:70%;left:4%;animation-delay:1.6s">⭐</span>
<span class="star" style="bottom:12%;right:6%;animation-delay:.4s">✨</span>
<span class="star" style="top:45%;right:3%;animation-delay:2s">⭐</span>

<div class="container">
  <div class="logo">🎓</div>
  <h1>英文複習樂園</h1>
  <p class="sub">選擇要複習的教材</p>

  <div class="cards">
    <a class="card ff-card" href="ff-review.html">
      <span class="ci">📚</span>
      <div class="ct">
        <div class="cn">Family and Friends</div>
        <div class="cd">對話句型・文法練習・改錯遊戲</div>
      </div>
    </a>
    <a class="card rd-card" href="reading-review.html">
      <span class="ci">📖</span>
      <div class="ct">
        <div class="cn">Reading</div>
        <div class="cd">故事複習・單字卡・閱讀理解</div>
      </div>
    </a>
    <a class="card gr-card" href="grammar-review.html">
      <span class="ci">✏️</span>
      <div class="ct">
        <div class="cn">Grammar</div>
        <div class="cd">文法重點・句型練習・測驗</div>
      </div>
    </a>
    <a class="card gr-card" href="words.html">
      <span class="ci">✏️</span>
      <div class="ct">
        <div class="cn">Phonics/Vocabulary</div>
        <div class="cd">發音、單字學習</div>
      </div>
    </a>
    <a class="card mt-card" href="midterm-review.html">
      <span class="ci">🏆</span>
      <div class="ct">
        <div class="cn">Midterm Review <span class="mt-badge">NEW</span></div>
        <div class="cd">期中考總複習・五大項目一次搞定</div>
      </div>
    </a>
  </div>

  <p class="footer">點選教材開始複習！</p>
</div>
</body>
</html>
