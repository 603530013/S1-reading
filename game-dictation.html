<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聽寫 Dictation · 單字複習</title>
<link rel="stylesheet" href="games-common.css">
<style>
.play-btn{
  background:#a855f7;color:white;border:none;border-radius:999px;
  width:80px;height:80px;cursor:pointer;font-size:2em;
  box-shadow:0 6px 20px rgba(168,85,247,.3);transition:transform .15s;
}
.play-btn:hover{transform:scale(1.08);background:#9333ea}
.play-btn:disabled{background:#d4d4d8;box-shadow:none;cursor:not-allowed}
</style>
</head>
<body>
<div class="wrap">
  <header class="page-hd">
    <h1>🎧 聽寫 Dictation</h1>
    <a class="back" href="words.html">← 返回</a>
  </header>
  <p class="page-sub">聽英文發音，輸入正確拼字</p>

  <!-- Step 1: 範圍選擇 -->
  <div id="setup" class="card">
    <h2>📚 選擇範圍</h2>
    <h3>內容類型</h3>
    <div class="type-grid">
      <button class="type-card on" data-type="phonics"><div class="emoji">🔤</div><div class="nm">Phonics</div><div class="ds">自然發音單字</div></button>
      <button class="type-card" data-type="vocab"><div class="emoji">📘</div><div class="nm">Vocabulary</div><div class="ds">課文單字</div></button>
    </div>
    <h3>週次範圍</h3>
    <div id="week-selector"></div>
    <div class="btn-row">
      <button class="btn-outline" id="btn-all">全選所有週</button>
      <button class="btn btn-lg" id="btn-start">開始遊戲 🎮</button>
    </div>
    <p class="small mt-8">提示：按「開始遊戲」後會朗讀單字，請依聽到的內容輸入。</p>
  </div>

  <!-- Step 2: 遊戲 -->
  <div id="play" class="card hidden">
    <div class="flex-between mb-12">
      <button class="btn-ghost" id="btn-exit">← 離開</button>
      <span id="q-count" class="small"></span>
    </div>
    <div class="progress"><div class="bar" id="progress-bar" style="width:0%"></div></div>
    <div class="prog-meta">
      <span>進度</span>
      <span id="score-text">✅ 0　❌ 0</span>
    </div>
    <div class="question-box">
      <div class="qhint">點擊播放聆聽</div>
      <button class="play-btn" id="btn-play">🔊</button>
      <div class="def-hint hidden" id="def-hint"></div>
    </div>
    <div class="input-wrap">
      <input type="text" id="answer-input" placeholder="輸入你聽到的單字..." autocomplete="off" autocapitalize="off" spellcheck="false">
    </div>
    <div class="btn-row" style="justify-content:center">
      <button class="btn-outline" id="btn-hint">顯示提示</button>
      <button class="btn" id="btn-check">確認 ✔</button>
    </div>
    <div id="feedback" class="hidden"></div>
    <div class="btn-row hidden" id="nav-row" style="justify-content:center">
      <button class="btn btn-lg" id="btn-next">下一題 →</button>
    </div>
  </div>

  <!-- Step 3: 結果 -->
  <div id="result" class="card hidden">
    <h2>🎉 完成！</h2>
    <div class="stat-row">
      <div class="stat-box"><div class="n" id="r-correct">0</div><div class="l">答對</div></div>
      <div class="stat-box"><div class="n" id="r-wrong">0</div><div class="l">答錯</div></div>
      <div class="stat-box"><div class="n" id="r-rate">0%</div><div class="l">正確率</div></div>
    </div>
    <div class="btn-row">
      <button class="btn" id="btn-again">再玩一次 🔁</button>
      <a class="btn-outline" href="words.html" style="text-decoration:none;display:inline-block">選其他遊戲</a>
    </div>
  </div>
</div>

<script src="data/phonics-114-1.js"></script>
<script src="data/vocabulary-114-1.js"></script>
<script src="data/phonics-114-2.js"></script>
<script src="data/vocabulary-114-2.js"></script>
<script src="games-common.js"></script>
<script>
(function(){
  var $setup = document.getElementById('setup');
  var $play = document.getElementById('play');
  var $result = document.getElementById('result');
  var $weekSel = document.getElementById('week-selector');
  var $typeCards = document.querySelectorAll('.type-card');
  var $input = document.getElementById('answer-input');
  var $btnPlay = document.getElementById('btn-play');
  var $btnCheck = document.getElementById('btn-check');
  var $btnNext = document.getElementById('btn-next');
  var $btnHint = document.getElementById('btn-hint');
  var $btnExit = document.getElementById('btn-exit');
  var $btnAll = document.getElementById('btn-all');
  var $btnStart = document.getElementById('btn-start');
  var $btnAgain = document.getElementById('btn-again');
  var $defHint = document.getElementById('def-hint');
  var $progress = document.getElementById('progress-bar');
  var $qCount = document.getElementById('q-count');
  var $scoreText = document.getElementById('score-text');
  var $feedback = document.getElementById('feedback');
  var $navRow = document.getElementById('nav-row');

  var contentType = 'phonics';
  var selector = buildWeekSelector($weekSel, contentType);

  $typeCards.forEach(function(c){
    c.addEventListener('click', function(){
      $typeCards.forEach(function(x){x.classList.remove('on');});
      c.classList.add('on');
      contentType = c.dataset.type;
      selector = buildWeekSelector($weekSel, contentType);
    });
  });

  $btnAll.addEventListener('click', function(){ selector.selectAll(); });

  var questions = [];
  var idx = 0, correct = 0, wrong = 0;
  var answered = false;

  $btnStart.addEventListener('click', function(){
    var sel = selector.getSelection();
    var items = filterItems({type: contentType, weeks: sel.weeks});
    if(items.length===0){ alert('請先選擇至少一個週次！'); return; }
    questions = shuffle(items);
    idx = 0; correct = 0; wrong = 0;
    $setup.classList.add('hidden');
    $result.classList.add('hidden');
    $play.classList.remove('hidden');
    showQuestion();
  });

  function showQuestion(){
    answered = false;
    var q = questions[idx];
    $input.value = '';
    $input.classList.remove('correct','wrong');
    $input.disabled = false;
    $feedback.classList.add('hidden');
    $defHint.classList.add('hidden');
    $defHint.textContent = '';
    $navRow.classList.add('hidden');
    $btnCheck.disabled = false;
    $btnHint.disabled = false;

    var pct = ((idx) / questions.length) * 100;
    $progress.style.width = pct + '%';
    $qCount.textContent = '第 ' + (idx+1) + ' / ' + questions.length + ' 題';
    $scoreText.textContent = '✅ ' + correct + '　❌ ' + wrong;

    // 自動朗讀
    setTimeout(function(){ speak(q.audioText); }, 300);
    $input.focus();
  }

  $btnPlay.addEventListener('click', function(){
    var q = questions[idx];
    if(q) speak(q.audioText);
  });

  $btnHint.addEventListener('click', function(){
    var q = questions[idx];
    if(!q) return;
    $defHint.textContent = '💡 ' + q.answers[0].def;
    $defHint.classList.remove('hidden');
    $btnHint.disabled = true;
  });

  function check(){
    if(answered) return;
    var q = questions[idx];
    var user = ($input.value || '').trim().toLowerCase();
    var ans = q.answers[0].word.toLowerCase();
    answered = true;
    $btnCheck.disabled = true;
    $input.disabled = true;

    if(user === ans){
      correct++;
      $input.classList.add('correct');
      $feedback.className = 'feedback ok';
      $feedback.textContent = '🎉 正確！';
    } else {
      wrong++;
      $input.classList.add('wrong');
      $feedback.className = 'feedback ng';
      $feedback.textContent = '答錯了！正確答案：' + q.answers[0].word + '（' + q.answers[0].def + '）';
    }
    $feedback.classList.remove('hidden');
    $scoreText.textContent = '✅ ' + correct + '　❌ ' + wrong;
    $navRow.classList.remove('hidden');
  }
  $btnCheck.addEventListener('click', check);
  onEnter($input, check);

  $btnNext.addEventListener('click', function(){
    if(idx+1 >= questions.length){ showResult(); }
    else { idx++; showQuestion(); }
  });

  function showResult(){
    $play.classList.add('hidden');
    $result.classList.remove('hidden');
    document.getElementById('r-correct').textContent = correct;
    document.getElementById('r-wrong').textContent = wrong;
    var total = correct + wrong;
    var rate = total>0 ? Math.round(correct/total*100) : 0;
    document.getElementById('r-rate').textContent = rate + '%';
  }

  $btnExit.addEventListener('click', function(){
    if(confirm('確定要離開目前遊戲？')){
      $play.classList.add('hidden');
      $setup.classList.remove('hidden');
    }
  });
  $btnAgain.addEventListener('click', function(){
    $result.classList.add('hidden');
    $setup.classList.remove('hidden');
  });
})();
</script>
</body>
</html>
