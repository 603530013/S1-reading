<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar 複習</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Baloo+2:wght@700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;min-height:100vh;background:linear-gradient(180deg,#fdf4ff,#f5d0fe);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.box{background:white;border-radius:24px;padding:36px 28px;max-width:400px;width:100%;
  text-align:center;box-shadow:0 8px 28px rgba(0,0,0,.1)}
.emoji{font-size:4em;margin-bottom:12px}
h1{font-family:'Baloo 2',cursive;font-size:1.6em;color:#c026d3;margin-bottom:8px}
p{color:#64748b;font-size:.95em;line-height:1.6;margin-bottom:20px}
a{display:inline-block;padding:10px 22px;background:#c026d3;color:white;
  border-radius:20px;font-family:'Baloo 2',cursive;font-weight:700;text-decoration:none;
  font-size:.95em;transition:transform .2s}
a:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<div class="box">
  <div class="emoji">✏️</div>
  <h1>Grammar 複習</h1>
  <p>Grammar 的複習內容正在準備中！<br>請上傳課本頁面，讓我幫你建立複習頁面。</p>
  <a href="index.html">← 回首頁</a>
</div>
</body>
</html>
