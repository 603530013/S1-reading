<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>連連看 Matching · 單字複習</title>
<link rel="stylesheet" href="games-common.css">
<style>
.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:8px}
@media(max-width:600px){.match-wrap{grid-template-columns:1fr 1fr;gap:10px}}
.match-col{display:flex;flex-direction:column;gap:10px}
.match-item{
  background:white;border:2px solid #e9d5ff;border-radius:14px;padding:12px 14px;
  cursor:pointer;transition:all .15s;font-family:inherit;text-align:center;
  font-size:1em;color:#1f2937;line-height:1.4;
}
.match-item:hover{border-color:#a855f7;background:#faf5ff}
.match-item.sel{background:#fef3c7;border-color:#f59e0b;color:#92400e;box-shadow:0 4px 14px rgba(245,158,11,.25)}
.match-item.matched{background:#dcfce7;border-color:#16a34a;color:#15803d;cursor:default;opacity:.75}
.match-item.shake{animation:shake .35s}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-6px)}
  75%{transform:translateX(6px)}
}
.match-word{font-family:'Baloo 2',cursive;font-size:1.15em}
.match-def{font-size:.95em}
.match-info{
  display:flex;justify-content:space-between;gap:10px;margin-bottom:12px;
  font-size:.9em;color:#7e22ce;flex-wrap:wrap;
}
.round-pill{background:#ede9fe;color:#6d28d9;padding:4px 14px;border-radius:999px;font-weight:800}
</style>
</head>
<body>
<div class="wrap">
  <header class="page-hd">
    <h1>🔗 連連看 Matching</h1>
    <a class="back" href="words.html">← 返回</a>
  </header>
  <p class="page-sub">點擊左側英文單字，再點擊右側中文解釋，配對相同意思的一組</p>

  <div id="setup" class="card">
    <h2>📚 選擇範圍</h2>
    <h3>內容類型</h3>
    <div class="type-grid">
      <button class="type-card on" data-type="phonics"><div class="emoji">🔤</div><div class="nm">Phonics</div><div class="ds">自然發音單字</div></button>
      <button class="type-card" data-type="vocab"><div class="emoji">📘</div><div class="nm">Vocabulary</div><div class="ds">課文單字</div></button>
    </div>
    <h3>週次範圍</h3>
    <div id="week-selector"></div>
    <div class="btn-row">
      <button class="btn-outline" id="btn-all">全選所有週</button>
      <button class="btn btn-lg" id="btn-start">開始遊戲 🎮</button>
    </div>
    <p class="small mt-8">每回合 6 組配對，全部配對成功後進入下一回合。</p>
  </div>

  <div id="play" class="card hidden">
    <div class="flex-between mb-12">
      <button class="btn-ghost" id="btn-exit">← 離開</button>
      <span class="round-pill" id="round-text">回合 1</span>
    </div>
    <div class="match-info">
      <span id="match-count">已配對 0 / 0</span>
      <span id="attempt-text">嘗試次數：0</span>
    </div>
    <div class="match-wrap">
      <div class="match-col" id="col-left"></div>
      <div class="match-col" id="col-right"></div>
    </div>
    <div class="btn-row hidden" id="next-row" style="justify-content:center">
      <button class="btn btn-lg" id="btn-next">下一回合 →</button>
    </div>
  </div>

  <div id="result" class="card hidden">
    <h2>🎉 完成！</h2>
    <div class="stat-row">
      <div class="stat-box"><div class="n" id="r-round">0</div><div class="l">完成回合</div></div>
      <div class="stat-box"><div class="n" id="r-pairs">0</div><div class="l">配對總數</div></div>
      <div class="stat-box"><div class="n" id="r-attempts">0</div><div class="l">嘗試次數</div></div>
    </div>
    <div class="btn-row">
      <button class="btn" id="btn-again">再玩一次 🔁</button>
      <a class="btn-outline" href="words.html" style="text-decoration:none">選其他遊戲</a>
    </div>
  </div>
</div>

<script src="data/phonics-114-1.js"></script>
<script src="data/vocabulary-114-1.js"></script>
<script src="data/phonics-114-2.js"></script>
<script src="data/vocabulary-114-2.js"></script>
<script src="games-common.js"></script>
<script>
(function(){
  var PAIRS_PER_ROUND = 6;
  var $setup = document.getElementById('setup');
  var $play = document.getElementById('play');
  var $result = document.getElementById('result');
  var $weekSel = document.getElementById('week-selector');
  var $typeCards = document.querySelectorAll('.type-card');
  var $left = document.getElementById('col-left');
  var $right = document.getElementById('col-right');
  var $btnAll = document.getElementById('btn-all');
  var $btnStart = document.getElementById('btn-start');
  var $btnNext = document.getElementById('btn-next');
  var $btnExit = document.getElementById('btn-exit');
  var $btnAgain = document.getElementById('btn-again');
  var $roundText = document.getElementById('round-text');
  var $matchCount = document.getElementById('match-count');
  var $attemptText = document.getElementById('attempt-text');
  var $nextRow = document.getElementById('next-row');

  var contentType = 'phonics';
  var selector = buildWeekSelector($weekSel, contentType);
  $typeCards.forEach(function(c){
    c.addEventListener('click', function(){
      $typeCards.forEach(function(x){x.classList.remove('on');});
      c.classList.add('on');
      contentType = c.dataset.type;
      selector = buildWeekSelector($weekSel, contentType);
    });
  });
  $btnAll.addEventListener('click', function(){ selector.selectAll(); });

  var pool = [];
  var round = 0;
  var totalPairs = 0;
  var totalAttempts = 0;
  var matchedInRound = 0;
  var currentPairs = [];
  var selLeft = null;

  $btnStart.addEventListener('click', function(){
    var sel = selector.getSelection();
    var items = filterItems({type: contentType, weeks: sel.weeks});
    if(items.length===0){ alert('請先選擇至少一個週次！'); return; }
    // 去重（同字不同 id 可能存在；依 word 去重）
    var seen = {};
    pool = [];
    items.forEach(function(it){
      var w = it.answers[0].word.toLowerCase();
      if(!seen[w]){ seen[w] = true; pool.push(it); }
    });
    pool = shuffle(pool);
    round = 0; totalPairs = 0; totalAttempts = 0;
    $setup.classList.add('hidden');
    $result.classList.add('hidden');
    $play.classList.remove('hidden');
    startRound();
  });

  function startRound(){
    round++;
    matchedInRound = 0;
    selLeft = null;
    $nextRow.classList.add('hidden');
    // 抽 N 題
    var n = Math.min(PAIRS_PER_ROUND, pool.length);
    currentPairs = pool.splice(0, n);
    if(currentPairs.length===0){ showResult(); return; }

    $roundText.textContent = '回合 ' + round;
    $matchCount.textContent = '已配對 0 / ' + currentPairs.length;
    $attemptText.textContent = '嘗試次數：' + totalAttempts;

    var lefts = currentPairs.map(function(p, i){ return {idx:i, word:p.answers[0].word}; });
    var rights = shuffle(currentPairs.map(function(p, i){ return {idx:i, def:p.answers[0].def}; }));

    $left.innerHTML = ''; $right.innerHTML = '';
    lefts.forEach(function(l){
      var e = el('button',{cls:'match-item',on:{click:function(){ pickLeft(l.idx, e); }}},[
        el('div',{cls:'match-word',text:l.word})
      ]);
      e.dataset.idx = l.idx;
      e.dataset.side = 'left';
      $left.appendChild(e);
    });
    rights.forEach(function(r){
      var e = el('button',{cls:'match-item',on:{click:function(){ pickRight(r.idx, e); }}},[
        el('div',{cls:'match-def',text:r.def})
      ]);
      e.dataset.idx = r.idx;
      e.dataset.side = 'right';
      $right.appendChild(e);
    });
  }

  function pickLeft(idx, elem){
    if(elem.classList.contains('matched')) return;
    // 取消之前選的
    Array.from($left.children).forEach(function(c){c.classList.remove('sel');});
    elem.classList.add('sel');
    selLeft = {idx:idx, elem:elem};
  }
  function pickRight(idx, elem){
    if(elem.classList.contains('matched')) return;
    if(!selLeft){
      // 閃一下提示
      elem.classList.add('shake');
      setTimeout(function(){elem.classList.remove('shake');}, 400);
      return;
    }
    totalAttempts++;
    $attemptText.textContent = '嘗試次數：' + totalAttempts;

    if(selLeft.idx === idx){
      // 配對成功
      selLeft.elem.classList.remove('sel');
      selLeft.elem.classList.add('matched');
      elem.classList.add('matched');
      selLeft = null;
      matchedInRound++;
      totalPairs++;
      $matchCount.textContent = '已配對 ' + matchedInRound + ' / ' + currentPairs.length;
      // 播放單字發音
      var word = selLeft ? '' : currentPairs[idx].answers[0].word;
      if(word) speak(word);
      if(matchedInRound >= currentPairs.length){
        if(pool.length === 0){
          setTimeout(showResult, 600);
        } else {
          $nextRow.classList.remove('hidden');
        }
      }
    } else {
      // 配對失敗
      elem.classList.add('shake');
      var leftElem = selLeft.elem;
      leftElem.classList.add('shake');
      setTimeout(function(){
        elem.classList.remove('shake');
        leftElem.classList.remove('shake','sel');
      }, 400);
      selLeft = null;
    }
  }

  $btnNext.addEventListener('click', startRound);

  function showResult(){
    $play.classList.add('hidden');
    $result.classList.remove('hidden');
    document.getElementById('r-round').textContent = round;
    document.getElementById('r-pairs').textContent = totalPairs;
    document.getElementById('r-attempts').textContent = totalAttempts;
  }

  $btnExit.addEventListener('click', function(){
    if(confirm('確定要離開目前遊戲？')){
      $play.classList.add('hidden');
      $setup.classList.remove('hidden');
    }
  });
  $btnAgain.addEventListener('click', function(){
    $result.classList.add('hidden');
    $setup.classList.remove('hidden');
  });
})();
</script>
</body>
</html>
