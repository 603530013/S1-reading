        const domRootContainer = document.getElementById('root');

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = type === 'error' ? 'log-error' : 'log-info';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            debugConsole.appendChild(div);
            if (type === 'error') {
                debugConsole.style.display = 'block';
                statusText.textContent = "發生錯誤 (Error): " + msg;
                statusText.style.color = "red";
            } else {
                statusText.textContent = msg;
            }
            console.log(msg);
        }

        window.onerror = function(msg, url, line) {
            log(`Global Error: ${msg} (Line: ${line})`, 'error');
            return false;
        };

        log("Step 2: Script initialization started.");

                log("Step 4: Libraries detected. React is ready.");
            }
        };
    </script>

            // --- Components ---
            const Button = ({ onClick, children, variant = "primary", className = "", disabled = false }) => {
                const baseStyle = "px-6 py-2 rounded-lg font-bold transition-all shadow-sm active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed";
                const variants = {
                    primary: "bg-blue-600 text-white hover:bg-blue-700",
                    secondary: "bg-gray-200 text-gray-800 hover:bg-gray-300",
                    success: "bg-green-500 text-white hover:bg-green-600",
                    danger: "bg-red-500 text-white hover:bg-red-600",
                    outline: "border-2 border-blue-600 text-blue-600 hover:bg-blue-50",
                    ghost: "text-gray-500 hover:bg-gray-100"
                };
                return (
                    <button onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>
                        {children}
                    </button>
                );
            };

            const ProgressBar = ({ current, total }) => {
                const percent = Math.min(100, (current / total) * 100);
                return (
                    <div className="w-full bg-gray-200 rounded-full h-2.5 mb-4">
                        <div className="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style={{ width: `${percent}%` }}></div>
                        <div className="text-xs text-gray-500 text-right mt-1">{current} / {total}</div>
                    </div>
                );
            };

            // --- Word Search Game Logic ---
            const WordSearchGame = ({ words, onFinish, onExit }) => {
                const GRID_SIZE = 10;
                const [grid, setGrid] = useState([]);
                const [targetWords, setTargetWords] = useState([]);
                const [foundWords, setFoundWords] = useState(new Set());
                const [selection, setSelection] = useState([]); 
                const [foundCells, setFoundCells] = useState(new Set()); 

                // Initialize Grid
                useEffect(() => {
                    const cleanWords = words.map(w => w.word.replace(/[^a-zA-Z]/g, '').toUpperCase()).filter(w => w.length <= GRID_SIZE);
                    const uniqueWords = [...new Set(cleanWords)];
                    
                    const newGrid = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(''));
                    const placed = [];

                    uniqueWords.forEach(word => {
                        let placedWord = false;
                        let attempts = 0;
                        while (!placedWord && attempts < 100) {
                            const direction = Math.floor(Math.random() * 3); 
                            const row = Math.floor(Math.random() * GRID_SIZE);
                            const col = Math.floor(Math.random() * GRID_SIZE);
                            
                            let fits = true;
                            if (direction === 0) { 
                                if (col + word.length > GRID_SIZE) fits = false;
                                else { for (let i = 0; i < word.length; i++) { if (newGrid[row][col + i] !== '' && newGrid[row][col + i] !== word[i]) fits = false; } }
                            } else if (direction === 1) { 
                                if (row + word.length > GRID_SIZE) fits = false;
                                else { for (let i = 0; i < word.length; i++) { if (newGrid[row + i][col] !== '' && newGrid[row + i][col] !== word[i]) fits = false; } }
                            } else { 
                                if (row + word.length > GRID_SIZE || col + word.length > GRID_SIZE) fits = false;
                                else { for (let i = 0; i < word.length; i++) { if (newGrid[row + i][col + i] !== '' && newGrid[row + i][col + i] !== word[i]) fits = false; } }
                            }

                            if (fits) {
                                for (let i = 0; i < word.length; i++) {
                                    if (direction === 0) newGrid[row][col + i] = word[i];
                                    else if (direction === 1) newGrid[row + i][col] = word[i];
                                    else newGrid[row + i][col + i] = word[i];
                                }
                                placed.push(word);
                                placedWord = true;
                            }
                            attempts++;
                        }
                    });

                    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
                    for(let r=0; r<GRID_SIZE; r++) {
                        for(let c=0; c<GRID_SIZE; c++) {
                            if(newGrid[r][c] === '') {
                                newGrid[r][c] = alphabet[Math.floor(Math.random() * alphabet.length)];
                            }
                        }
                    }

                    setGrid(newGrid);
                    setTargetWords(placed);
                }, [words]);

                const handleCellClick = (r, c) => {
                    if (selection.length === 0) {
                        setSelection([{r, c}]);
                    } else {
                        const start = selection[0];
                        const end = {r, c};
                        const path = getLinePath(start, end);
                        
                        if (path) {
                            const selectedWord = path.map(p => grid[p.r][p.c]).join("");
                            let isCorrect = false;
                            
                            // Check Normal
                            if (targetWords.includes(selectedWord) && !foundWords.has(selectedWord)) {
                                isCorrect = true;
                                const newFound = new Set(foundWords);
                                newFound.add(selectedWord);
                                setFoundWords(newFound);
                                
                                const newFoundCells = new Set(foundCells);
                                path.forEach(p => newFoundCells.add(`${p.r}-${p.c}`));
                                setFoundCells(newFoundCells);

                                if (newFound.size === targetWords.length) setTimeout(() => onFinish(100, []), 500);
                            } 
                            // Check Reverse
                            else {
                                const reversed = selectedWord.split('').reverse().join('');
                                if (targetWords.includes(reversed) && !foundWords.has(reversed)) {
                                    isCorrect = true;
                                    const newFound = new Set(foundWords);
                                    newFound.add(reversed);
                                    setFoundWords(newFound);

                                    const newFoundCells = new Set(foundCells);
                                    path.forEach(p => newFoundCells.add(`${p.r}-${p.c}`));
                                    setFoundCells(newFoundCells);

                                    if (newFound.size === targetWords.length) setTimeout(() => onFinish(100, []), 500);
                                }
                            }
                        }
                        setSelection([]);
                    }
                };

                const getLinePath = (start, end) => {
                    const dr = end.r - start.r;
                    const dc = end.c - start.c;
                    const steps = Math.max(Math.abs(dr), Math.abs(dc));
                    if (steps === 0) return [{r: start.r, c: start.c}];
                    if (dr !== 0 && dc !== 0 && Math.abs(dr) !== Math.abs(dc)) return null; 
                    const rStep = dr / steps;
                    const cStep = dc / steps;
                    const path = [];
                    for(let i=0; i<=steps; i++) {
                        path.push({ r: start.r + i*rStep, c: start.c + i*cStep });
                    }
                    return path;
                };

                return (
                    <div className="fade-in max-w-lg mx-auto">
                        <div className="flex justify-between items-center mb-4">
                            <Button variant="outline" onClick={onExit} className="px-3 py-1 text-sm">退出</Button>
                            <span className="font-bold text-gray-500">找到: {foundWords.size} / {targetWords.length}</span>
                        </div>

                        <div className="mb-4 flex flex-wrap gap-2 justify-center">
                            {targetWords.map(word => (
                                <span key={word} className={`px-2 py-1 rounded text-sm ${foundWords.has(word) ? 'bg-green-500 text-white line-through font-bold' : 'bg-gray-200'}`}>
                                    {word}
                                </span>
                            ))}
                        </div>

                        <div className="grid grid-cols-10 gap-1 bg-gray-200 p-2 rounded select-none touch-none">
                            {grid.map((row, rIdx) => 
                                row.map((char, cIdx) => {
                                    const isSelected = selection.length > 0 && selection[0].r === rIdx && selection[0].c === cIdx;
                                    const cellKey = `${rIdx}-${cIdx}`;
                                    const isFound = foundCells.has(cellKey);
                                    
                                    return (
                                        <div 
                                            key={cellKey} 
                                            onClick={() => handleCellClick(rIdx, cIdx)}
                                            className={`
                                                w-8 h-8 sm:w-10 sm:h-10 flex items-center justify-center font-bold rounded cursor-pointer text-sm sm:text-base transition-colors duration-300
                                                ${isFound ? 'bg-green-400 text-white shadow-inner' : (isSelected ? 'bg-blue-500 text-white' : 'bg-white hover:bg-blue-100')}
                                            `}
                                        >
                                            {char}
                                        </div>
                                    );
                                })
                            )}
                        </div>
                        <p className="text-center text-sm text-gray-500 mt-2">點擊首字，再點擊尾字來選取</p>
                    </div>
                );
            };

            // --- Hangman Game Logic ---
            const HangmanGame = ({ words, onFinish, onExit }) => {
                const [currentQIndex, setCurrentQIndex] = useState(0);
                const [mistakes, setMistakes] = useState(0);
                const [guessed, setGuessed] = useState(new Set());
                const [score, setScore] = useState(0);
                const maxMistakes = 6; 

                const currentQ = words[currentQIndex];
                const targetWord = currentQ ? currentQ.answers[0].word.toUpperCase() : "";

                useEffect(() => {
                    setMistakes(0);
                    setGuessed(new Set());
                }, [currentQIndex]);

                const handleGuess = (letter) => {
                    if (guessed.has(letter) || mistakes >= maxMistakes) return;
                    const newGuessed = new Set(guessed);
                    newGuessed.add(letter);
                    setGuessed(newGuessed);
                    if (!targetWord.includes(letter)) {
                        setMistakes(m => m + 1);
                    }
                };

                const isWon = targetWord.split('').every(l => {
                    const isLetter = /[A-Z]/.test(l);
                    return !isLetter || guessed.has(l);
                });
                
                const isLost = mistakes >= maxMistakes;

                const nextQuestion = () => {
                    if (isWon) setScore(s => s + 1);
                    if (currentQIndex < words.length - 1) {
                        setCurrentQIndex(prev => prev + 1);
                    } else {
                        onFinish(isWon ? score + 1 : score, []);
                    }
                };

                if (!currentQ) return <div>Loading...</div>;

                const renderMan = () => {
                    return (
                        <svg width="150" height="200" className="mx-auto border-b-2 border-gray-400">
                            <line x1="10" y1="190" x2="140" y2="190" stroke="black" strokeWidth="4"/>
                            <line x1="40" y1="190" x2="40" y2="20" stroke="black" strokeWidth="4"/>
                            <line x1="40" y1="20" x2="100" y2="20" stroke="black" strokeWidth="4"/>
                            <line x1="100" y1="20" x2="100" y2="40" stroke="black" strokeWidth="4"/>
                            {mistakes >= 1 && <circle cx="100" cy="60" r="20" stroke="black" strokeWidth="4" fill="transparent"/>}
                            {mistakes >= 2 && <line x1="100" y1="90" x2="70" y2="70" stroke="black" strokeWidth="4"/>}
                            {mistakes >= 3 && <line x1="100" y1="90" x2="130" y2="70" stroke="black" strokeWidth="4"/>}
                            {mistakes >= 4 && <line x1="100" y1="80" x2="100" y2="140" stroke="black" strokeWidth="4"/>}
                            {mistakes >= 5 && <line x1="100" y1="140" x2="70" y2="180" stroke="black" strokeWidth="4"/>}
                            {mistakes >= 6 && <line x1="100" y1="140" x2="130" y2="180" stroke="black" strokeWidth="4"/>}
                        </svg>
                    );
                };

                const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

                return (
                    <div className="fade-in max-w-lg mx-auto text-center">
                        <div className="flex justify-between items-center mb-2">
                            <Button variant="outline" onClick={onExit} className="px-3 py-1 text-sm">退出</Button>
                            <span className="font-bold text-gray-500">Q {currentQIndex + 1} / {words.length}</span>
                        </div>
                        <div className="mb-4 p-2 bg-yellow-100 rounded-lg border-2 border-yellow-300 shadow-sm">
                            <div className="text-sm text-yellow-800 font-bold mb-1">猜猜這個單字 (Guess the word):</div>
                            <div className="text-2xl text-gray-800 font-bold">{currentQ.answers[0].def}</div>
                        </div>
                        <div className="mb-6 h-64 relative">
                            {renderMan()}
                            {(isWon || isLost) && (
                                <div className={`absolute inset-0 flex items-center justify-center bg-white/80 text-2xl font-bold ${isWon ? 'text-green-600' : 'text-red-600'}`}>
                                    {isWon ? "過關! You Won!" : "失敗! Game Over"}
                                    <br/>
                                    {isLost && <span className="text-black text-sm">Ans: {targetWord}</span>}
                                </div>
                            )}
                        </div>
                        <div className="text-3xl font-mono tracking-widest mb-8 min-h-[40px] flex flex-wrap justify-center">
                            {targetWord.split('').map((l, i) => {
                                const isLetter = /[A-Z]/.test(l);
                                if (!isLetter) {
                                    return <span key={i} className="mx-2 w-4 inline-block">{l}</span>;
                                }
                                return (
                                    <span key={i} className="mx-1 border-b-2 border-gray-800 inline-block w-8">
                                        {guessed.has(l) || isLost ? l : "_"}
                                    </span>
                                );
                            })}
                        </div>
                        {!isWon && !isLost ? (
                            <div className="grid grid-cols-7 gap-2">
                                {alphabet.map(l => (
                                    <button key={l} onClick={() => handleGuess(l)} disabled={guessed.has(l)} className={`p-2 rounded font-bold ${guessed.has(l) ? 'bg-gray-300 text-gray-500' : 'bg-blue-100 hover:bg-blue-200 text-blue-800'}`}>
                                        {l}
                                    </button>
                                ))}
                            </div>
                        ) : (
                            <Button onClick={nextQuestion} className="w-full">
                                {currentQIndex < words.length - 1 ? "下一題" : "看成績"}
                            </Button>
                        )}
                    </div>
                );
            };

            // --- Mode Selection Screen ---
            const ModeSelectScreen = ({ onSelect }) => (
                <div className="fade-in max-w-2xl mx-auto py-4 px-2">
                    <h2 className="text-2xl font-bold text-gray-800 mb-6 text-center">請選擇遊戲模式</h2>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <button onClick={() => onSelect('dictation')} className="p-6 bg-white border-2 border-indigo-100 rounded-xl hover:border-indigo-500 hover:shadow-md transition-all flex flex-col items-center">
                            <span className="text-3xl mb-2">🎧</span><span className="font-bold text-gray-800">聽寫</span><span className="text-xs text-gray-500">可選 Phonics / Vocabulary</span>
                        </button>
                        <button onClick={() => onSelect('matching')} className="p-6 bg-white border-2 border-emerald-100 rounded-xl hover:border-emerald-500 hover:shadow-md transition-all flex flex-col items-center">
                            <span className="text-3xl mb-2">🔗</span><span className="font-bold text-gray-800">連連看</span><span className="text-xs text-gray-500">可選 Phonics / Vocabulary</span>
                        </button>
                        <button onClick={() => onSelect('wordsearch')} className="p-6 bg-white border-2 border-orange-100 rounded-xl hover:border-orange-500 hover:shadow-md transition-all flex flex-col items-center">
                            <span className="text-3xl mb-2">🔍</span><span className="font-bold text-gray-800">Word Search 找字</span><span className="text-xs text-gray-500">Phonics + Vocabulary</span>
                        </button>
                        <button onClick={() => onSelect('hangman')} className="p-6 bg-white border-2 border-red-100 rounded-xl hover:border-red-500 hover:shadow-md transition-all flex flex-col items-center">
                            <span className="text-3xl mb-2">😵</span><span className="font-bold text-gray-800">Hangman 劊子手</span><span className="text-xs text-gray-500">Phonics + Vocabulary</span>
                        </button>
                    </div>
                </div>
            );

            // --- Content Type Selection Screen ---
            const ContentTypeSelectScreen = ({ gameType, onSelect, onBack }) => {
                const titleMap = {
                    dictation: '聽寫',
                    matching: '連連看'
                };
                const currentTitle = titleMap[gameType] || '遊戲';
                return (
                    <div className="fade-in max-w-xl mx-auto py-6 px-2">
                        <div className="flex items-center justify-between border-b pb-4 mb-6">
                            <Button variant="ghost" onClick={onBack} className="text-gray-500">← 返回</Button>
                            <h2 className="text-xl font-bold text-gray-800">{currentTitle}：請選擇題庫</h2>
                            <div className="w-16"></div>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <button onClick={() => onSelect('phonics')} className="p-6 bg-white border-2 border-indigo-100 rounded-xl hover:border-indigo-500 hover:shadow-md transition-all flex flex-col items-center">
                                <span className="text-3xl mb-2">🔤</span><span className="font-bold text-gray-800">Phonics</span><span className="text-xs text-gray-500">自然發音單字</span>
                            </button>
                            <button onClick={() => onSelect('vocab')} className="p-6 bg-white border-2 border-emerald-100 rounded-xl hover:border-emerald-500 hover:shadow-md transition-all flex flex-col items-center">
                                <span className="text-3xl mb-2">📘</span><span className="font-bold text-gray-800">Vocabulary</span><span className="text-xs text-gray-500">課文單字</span>
                            </button>
                        </div>
                    </div>
                );
            };

            // --- Semester Section ---
            const SemesterSection = ({ term, colorClass, weeks, selectedFilters, onToggleWeek, onToggleAll }) => {
                if (!weeks || weeks.length === 0) return null;
                const colors = {
                    blue: { bg: 'bg-blue-50', border: 'border-blue-200', text: 'text-blue-800', badge: 'bg-blue-600' },
                    teal: { bg: 'bg-teal-50', border: 'border-teal-200', text: 'text-teal-800', badge: 'bg-teal-600' }
                };
                const c = colors[colorClass] || colors.blue;
                const allSelected = weeks.every(w => selectedFilters.includes(`${term}_${w}`));
                return (
                    <div className={`p-5 rounded-xl border ${c.bg} ${c.border} mb-6`}>
                        <div className="flex justify-between items-center mb-4 border-b border-gray-200/50 pb-2">
                            <div className="flex items-center gap-2">
                                <span className={`${c.badge} text-white px-3 py-1 rounded-full text-sm font-bold shadow-sm`}>{term}</span>
                            </div>
                            <Button variant="ghost" onClick={onToggleAll} className={`text-sm py-1 px-3 border ${allSelected ? 'bg-white shadow-sm' : ''}`}>{allSelected ? '取消全選' : '全選'}</Button>
                        </div>
                        <div className="flex flex-wrap gap-2 sm:gap-3">
                            {weeks.map(w => {
                                const isChecked = selectedFilters.includes(`${term}_${w}`);
                                return (
                                    <label key={w} className="cursor-pointer relative group">
                                        <input type="checkbox" className="custom-checkbox hidden" checked={isChecked} onChange={() => onToggleWeek(w)} />
                                        <div className={`px-3 py-1.5 sm:px-4 sm:py-2 rounded-lg border-2 font-medium transition-all select-none text-sm sm:text-base ${isChecked ? `bg-white ${c.border.replace('200','500')} ${c.text} shadow-md` : 'bg-white border-transparent shadow-sm text-gray-500 hover:bg-gray-100'}`}>{w}</div>
                                        {isChecked && <div className="absolute -top-1 -right-1 w-2 h-2 sm:w-3 sm:h-3 bg-green-500 rounded-full border-2 border-white"></div>}
                                    </label>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            // --- Week Selection Screen ---
            const WeekSelectionScreen = ({ gameType, contentType, rawData, selectedFilters, onToggleFilter, onToggleTerm, onStart, onBack }) => {
                const structure = useMemo(() => {
                    let filteredData = [];
                    if (gameType === 'wordsearch' || gameType === 'hangman') {
                        filteredData = rawData;
                    } else {
                        filteredData = rawData.filter(item => item.type === contentType);
                    }
                    const struct = filteredData.reduce((acc, item) => {
                        if (!acc[item.term]) acc[item.term] = new Set();
                        item.weeks.forEach(w => acc[item.term].add(w));
                        return acc;
                    }, {});
                    Object.keys(struct).forEach(term => {
                        struct[term] = Array.from(struct[term]).sort((a, b) => {
                            const numA = parseInt(a.replace('W', '')) || 0;
                            const numB = parseInt(b.replace('W', '')) || 0;
                            return numA - numB;
                        });
                    });
                    return struct;
                }, [gameType, contentType, rawData]);

                const hasData = Object.keys(structure).length > 0;

                return (
                    <div className="fade-in space-y-6">
                        <div className="flex items-center justify-between border-b pb-4">
                            <Button variant="ghost" onClick={onBack} className="text-gray-500">← 返回</Button>
                            <h2 className="text-xl font-bold text-gray-800 capitalize">{gameType === 'dictation' ? `聽寫（${contentType === 'phonics' ? 'Phonics' : 'Vocabulary'}）` : gameType === 'matching' ? `連連看（${contentType === 'phonics' ? 'Phonics' : 'Vocabulary'}）` : gameType === 'wordsearch' ? 'Word Search' : 'Hangman'} 範圍</h2>
                            <div className="w-16"></div> 
                        </div>
                        {!hasData ? ( <div className="text-center py-10 text-gray-500">此模式尚無資料</div> ) : (
                            <div>
                                {Object.keys(structure).sort().map(term => (
                                    <SemesterSection key={term} term={term} colorClass={term.includes('114-1') ? 'blue' : 'teal'} weeks={structure[term]} selectedFilters={selectedFilters} onToggleWeek={(w) => onToggleFilter(term, w)} onToggleAll={() => onToggleTerm(term, structure[term])} />
                                ))}
                            </div>
                        )}
                        <div className="sticky bottom-0 bg-white p-4 border-t shadow-lg -mx-6 -mb-6 mt-8 flex justify-center">
                            <Button onClick={onStart} className="w-full md:w-1/2 py-3 text-lg shadow-blue-200">開始測驗 ({selectedFilters.length} 個單元)</Button>
                        </div>
                    </div>
                );
            };

            // --- Game Components (Phonics, Vocab) ---
            const PhonicsGame = ({ questions, voiceURI, onFinish, onExit }) => {
                const [currentIndex, setCurrentIndex] = useState(0);
                const [inputs, setInputs] = useState([]);
                const [isChecked, setIsChecked] = useState(false);
                const [feedback, setFeedback] = useState(null);
                const [mistakeList, setMistakeList] = useState([]);
                const [score, setScore] = useState(0);
                const currentQ = questions[currentIndex];
                const firstInputRef = useRef(null);

                useEffect(() => {
                    if (currentQ) {
                        setInputs(Array(currentQ.answers.length).fill(""));
                        setIsChecked(false);
                        setFeedback(null);
                        playAudio(currentQ.audioText);
                        setTimeout(() => { if(firstInputRef.current) firstInputRef.current.focus(); }, 50);
                    }
                }, [currentIndex, currentQ]);

                const playAudio = (text) => {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    if (voiceURI) {
                        const voice = window.speechSynthesis.getVoices().find(v => v.voiceURI === voiceURI);
                        if (voice) utterance.voice = voice;
                    }
                    utterance.rate = 0.85;
                    window.speechSynthesis.speak(utterance);
                };

                const handleInputChange = (idx, val) => {
                    const newInputs = [...inputs];
                    newInputs[idx] = val;
                    setInputs(newInputs);
                };

                const checkAnswer = () => {
                    const targets = currentQ.answers;
                    let correctCount = 0;
                    let usedInputIndices = new Set();
                    let matchedTargetIndices = new Set();
                    
                    // Respect strictCase logic (e.g. for "June")
                    const normalize = (str) => currentQ.strictCase ? str.trim() : str.trim().toLowerCase();

                    targets.forEach((targetObj, tIdx) => {
                        const targetStr = normalize(targetObj.word);
                        const matchingInputIndex = inputs.findIndex((inp, iIdx) => !usedInputIndices.has(iIdx) && normalize(inp) === targetStr);
                        if (matchingInputIndex !== -1) {
                            correctCount++;
                            usedInputIndices.add(matchingInputIndex);
                            matchedTargetIndices.add(tIdx);
                        }
                    });

                    if (correctCount === targets.length) {
                        setScore(s => s + 1);
                        setFeedback({ status: 'correct' });
                    } else {
                        setMistakeList(prev => [...prev, { question: currentQ, userInputs: inputs }]);
                        setFeedback({ status: 'wrong', matchedIndices: matchedTargetIndices });
                    }
                    setIsChecked(true);
                };

                const nextQuestion = () => {
                    if (currentIndex < questions.length - 1) {
                        setCurrentIndex(prev => prev + 1);
                    } else {
                        // FIX: Pass score directly to prevent double counting
                        onFinish(score, mistakeList);
                    }
                };

                if (!currentQ) return <div>Loading...</div>;

                return (
                    <div className="fade-in max-w-lg mx-auto">
                        <div className="flex justify-between items-center mb-4">
                            <Button variant="outline" onClick={onExit} className="px-3 py-1 text-sm">退出</Button>
                            <span className="font-bold text-gray-500">Q {currentIndex + 1} / {questions.length}</span>
                        </div>
                        <ProgressBar current={currentIndex + 1} total={questions.length} />
                        <div className="text-center py-6">
                            <button onClick={() => playAudio(currentQ.audioText)} className="bg-blue-500 hover:bg-blue-600 text-white rounded-full p-6 shadow-lg mb-6"><svg className="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg></button>
                            <div className="space-y-4">
                                {inputs.map((val, idx) => (
                                    <input key={idx} type="text" ref={idx === 0 ? firstInputRef : null} value={val} onChange={(e) => handleInputChange(idx, e.target.value)} onKeyDown={(e) => e.key === 'Enter' && checkAnswer()} placeholder={`輸入單字...`} disabled={isChecked} className={`w-full text-center text-xl p-3 border-2 rounded-lg focus:outline-none focus:border-blue-500 ${isChecked ? (feedback.status === 'correct' ? 'border-green-500 bg-green-50' : 'border-red-300 bg-red-50') : 'border-gray-300'}`} />
                                ))}
                            </div>
                        </div>
                        {isChecked && (
                            <div className={`mt-6 p-4 rounded-lg border ${feedback.status === 'correct' ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                                <div className="space-y-2">
                                    {currentQ.answers.map((ans, i) => (
                                        <div key={i} className="flex justify-between border-b border-gray-200/50 last:border-0 pb-1">
                                            <span className="font-semibold text-gray-800">{ans.word}</span>
                                            <span className="text-gray-600 font-medium">{ans.def}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        <div className="mt-8 flex justify-center">
                            {!isChecked ? <Button onClick={checkAnswer} className="w-full text-lg">檢查答案</Button> : <Button onClick={nextQuestion} variant="secondary" className="w-full text-lg">{currentIndex === questions.length - 1 ? "看成績" : "下一題"}</Button>}
                        </div>
                    </div>
                );
            };

            const VocabGame = ({ pairList, onFinish, onExit }) => {
                const BATCH_SIZE = 10;
                const [batchIndex, setBatchIndex] = useState(0);
                const [leftCol, setLeftCol] = useState([]);
                const [rightCol, setRightCol] = useState([]);
                const [connections, setConnections] = useState({}); 
                
                // NEW: Use a single selectedNode state to support bidirectional selection
                const [selectedNode, setSelectedNode] = useState(null); 

                const [totalMistakes, setTotalMistakes] = useState([]);
                const [totalCorrect, setTotalCorrect] = useState(0);
                const containerRef = useRef(null);
                const [lines, setLines] = useState([]);
                const totalBatches = Math.ceil(pairList.length / BATCH_SIZE);

                useEffect(() => {
                    const start = batchIndex * BATCH_SIZE;
                    const end = start + BATCH_SIZE;
                    const currentBatch = pairList.slice(start, end);
                    if (currentBatch.length === 0) { onFinish(totalCorrect, totalMistakes); return; }
                    
                    const left = currentBatch.map(item => ({ id: item.id, text: item.word })).sort(() => Math.random() - 0.5);
                    const right = currentBatch.map(item => ({ id: item.id, text: item.def })).sort(() => Math.random() - 0.5);
                    setLeftCol(left); setRightCol(right); setConnections({}); setSelectedNode(null); setLines([]);
                }, [batchIndex]);

                const recalcLines = () => {
                    if (!containerRef.current) return;
                    const rect = containerRef.current.getBoundingClientRect();
                    const newLines = [];
                    Object.entries(connections).forEach(([lId, rId]) => {
                        const lEl = document.getElementById(`left-${lId}`);
                        const rEl = document.getElementById(`right-${rId}`);
                        if (lEl && rEl) {
                            const lRect = lEl.getBoundingClientRect();
                            const rRect = rEl.getBoundingClientRect();
                            newLines.push({
                                x1: lRect.right - rect.left, y1: lRect.top + lRect.height / 2 - rect.top,
                                x2: rRect.left - rect.left, y2: rRect.top + rRect.height / 2 - rect.top,
                            });
                        }
                    });
                    setLines(newLines);
                };

                useEffect(() => { setTimeout(recalcLines, 50); }, [connections, leftCol, rightCol]);
                useEffect(() => { window.addEventListener('resize', recalcLines); return () => window.removeEventListener('resize', recalcLines); }, [connections]);

                const handleNodeClick = (side, id) => {
                    let nextConnections = { ...connections };
                    let connectionChanged = false;

                    if (side === 'left') {
                        if (nextConnections[id]) { delete nextConnections[id]; connectionChanged = true; }
                    } else {
                        const leftId = Object.keys(nextConnections).find(key => nextConnections[key] === id);
                        if (leftId) { delete nextConnections[leftId]; connectionChanged = true; }
                    }

                    if (connectionChanged) setConnections(nextConnections);

                    if (!selectedNode) {
                        setSelectedNode({ side, id });
                    } else {
                        if (selectedNode.side === side) {
                            if (selectedNode.id === id) setSelectedNode(null); 
                            else setSelectedNode({ side, id }); 
                        } else {
                            const lId = side === 'left' ? id : selectedNode.id;
                            const rId = side === 'right' ? id : selectedNode.id;
                            nextConnections[lId] = rId;
                            setConnections(nextConnections);
                            setSelectedNode(null);
                        }
                    }
                };

                const checkBatch = () => {
                    let corr = 0; let m = [];
                    Object.entries(connections).forEach(([lId, rId]) => {
                        const leftItem = pairList.find(p => p.id === lId);
                        const rightItem = pairList.find(p => p.id === rId);
                        let isCorrect = (lId === rId);

                        if (!isCorrect && leftItem && rightItem) {
                            if (leftItem.def === rightItem.def) isCorrect = true;
                        }

                        if (isCorrect) { corr++; } 
                        else {
                            m.push({ 
                                question: { audioText: leftItem?.word, answers: [{ word: leftItem?.word, def: leftItem?.def }] }, 
                                userInputs: [`連錯: ${rightItem?.def}`] 
                            });
                        }
                    });
                    
                    leftCol.forEach(l => { 
                        if (!connections[l.id]) {
                            const leftItem = pairList.find(p => p.id === l.id);
                            m.push({ question: { audioText: leftItem?.word, answers: [{ word: leftItem?.word, def: leftItem?.def }] }, userInputs: ["未回答"] }); 
                        }
                    });

                    setTotalCorrect(p => p + corr); setTotalMistakes(p => [...p, ...m]); setBatchIndex(p => p + 1);
                };

                return (
                    <div className="fade-in">
                        <div className="flex justify-between items-center mb-4">
                            <Button variant="outline" onClick={onExit} className="px-3 py-1 text-sm">退出</Button>
                            <span className="font-bold text-gray-500">Group {batchIndex + 1} / {totalBatches}</span>
                        </div>
                        <div className="relative bg-white p-2 rounded-lg" ref={containerRef}>
                            <svg className="absolute top-0 left-0 w-full h-full pointer-events-none z-10" style={{minHeight: '400px'}}>
                                {lines.map((l, i) => <line key={i} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} stroke="#3b82f6" strokeWidth="3" strokeLinecap="round" opacity="0.6" />)}
                            </svg>
                            <div className="flex justify-between gap-4 relative z-20">
                                <div className="w-1/2 space-y-4">{leftCol.map(item => {
                                        const isSelected = selectedNode?.side === 'left' && selectedNode.id === item.id;
                                        const isConnected = connections[item.id] !== undefined;
                                        return (
                                            <div key={item.id} id={`left-${item.id}`} onClick={() => handleNodeClick('left', item.id)} 
                                                className={`p-3 border-2 rounded-lg cursor-pointer flex items-center justify-between transition-all ${isSelected ? 'border-blue-600 bg-blue-50 transform scale-105 shadow-md' : 'border-gray-200 hover:border-blue-300'} ${isConnected && !isSelected ? 'bg-blue-50 border-blue-400' : ''}`}>
                                                <span className="font-bold text-sm sm:text-base">{item.text}</span>
                                                {isConnected && <div className="w-2 h-2 bg-blue-500 rounded-full"></div>}
                                            </div>
                                        );
                                    })}</div>
                                <div className="w-1/2 space-y-4">{rightCol.map(item => {
                                        const isSelected = selectedNode?.side === 'right' && selectedNode.id === item.id;
                                        const isConnected = Object.values(connections).includes(item.id);
                                        return (
                                            <div key={item.id} id={`right-${item.id}`} onClick={() => handleNodeClick('right', item.id)} 
                                                className={`p-3 border-2 rounded-lg cursor-pointer flex items-center transition-all ${isSelected ? 'border-blue-600 bg-blue-50 transform scale-105 shadow-md' : 'border-gray-200 hover:border-blue-300'} ${isConnected && !isSelected ? 'border-blue-400 bg-blue-50' : ''}`}>
                                                {isConnected && <div className="w-2 h-2 bg-blue-500 rounded-full mr-2"></div>}
                                                <span className="text-gray-700 text-sm sm:text-base">{item.text}</span>
                                            </div>
                                        );
                                    })}</div>
                            </div>
                        </div>
                        <div className="mt-8 text-center"><Button onClick={checkBatch} className="w-1/2">{batchIndex === totalBatches - 1 ? "完成" : "下一組"}</Button></div>
                    </div>
                );
            };

            const ResultView = ({ data, mode, onRestart }) => {
                const percentage = Math.round((data.correct / data.total) * 100) || 0;
                return (
                    <div className="fade-in text-center">
                        <h2 className="text-2xl font-bold mb-6">測驗結果 ({mode === 'phonics' ? 'Phonics' : 'Vocabulary'})</h2>
                        <div className="text-4xl font-bold text-blue-600 mb-2">{data.correct} / {data.total}</div>
                        <div className="text-xl mb-8">{percentage}% 正確率</div>
                        
                        {data.mistakes.length > 0 && (
                            <div className="text-left mb-8">
                                <h3 className="text-lg font-bold text-red-600 mb-4 bg-red-50 p-2 rounded">❌ 錯誤檢討 (Review)</h3>
                                <div className="space-y-4 max-h-[300px] overflow-y-auto pr-2">
                                    {data.mistakes.map((m, i) => (
                                        <div key={i} className="border border-gray-200 rounded-lg p-3 shadow-sm bg-white">
                                            <div className="flex justify-between items-start mb-2">
                                                <span className="bg-gray-200 text-gray-700 px-2 py-0.5 rounded text-xs">Mistake</span>
                                                {m.question.audioText && <span className="text-gray-500 text-sm italic">🔊 {m.question.audioText}</span>}
                                            </div>
                                            <div className="mb-2">
                                                <span className="text-red-500 font-bold text-sm">你的回答: </span>
                                                <span className="text-gray-700">{m.userInputs.join(", ")}</span>
                                            </div>
                                            <div className="bg-green-50 p-2 rounded border border-green-100">
                                                <span className="text-green-700 font-bold text-sm block mb-1">正確答案:</span>
                                                {m.question.answers.map((ans, idx) => (
                                                    <div key={idx} className="text-sm text-gray-800 flex justify-between">
                                                        <span className="font-mono font-bold">{ans.word}</span>
                                                        <span className="text-gray-600">{ans.def}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        <Button onClick={onRestart} className="w-full">回到主選單</Button>
                    </div>
                );
            };

            // --- App ---
            const App = () => {
                useEffect(() => { startApp(); }, []);

                const [step, setStep] = useState('mode_select'); // mode_select, content_select, week_select, game, result
                const [gameType, setGameType] = useState(null); // dictation, matching, wordsearch, hangman
                const [contentType, setContentType] = useState(null); // phonics, vocab
                const [selectedFilters, setSelectedFilters] = useState([]);
                const [questions, setQuestions] = useState([]);
                const [scoreData, setScoreData] = useState({ correct: 0, total: 0, mistakes: [] });
                const [voices, setVoices] = useState([]);
                const [selectedVoiceURI, setSelectedVoiceURI] = useState(null);

                useEffect(() => {
                    const loadVoices = () => {
                        const vs = window.speechSynthesis.getVoices();
                        setVoices(vs);
                        const defaultVoice = vs.find(v => v.name.includes("Google US English")) || vs.find(v => v.lang.startsWith("en"));
                        if (defaultVoice && !selectedVoiceURI) setSelectedVoiceURI(defaultVoice.voiceURI);
                    };
                    loadVoices();
                    window.speechSynthesis.onvoiceschanged = loadVoices;
                }, []);

                const handleModeSelect = (mode) => {
                    setGameType(mode);
                    setSelectedFilters([]);
                    if (mode === 'dictation' || mode === 'matching') {
                        setContentType(null);
                        setStep('content_select');
                    } else {
                        setContentType(null);
                        setStep('week_select');
                    }
                };

                const handleContentTypeSelect = (type) => {
                    setContentType(type);
                    setSelectedFilters([]);
                    setStep('week_select');
                };

                const toggleFilter = (term, week) => {
                    const key = `${term}_${week}`;
                    setSelectedFilters(prev => prev.includes(key) ? prev.filter(k => k !== key) : [...prev, key]);
                };

                const toggleTermAll = (term, weeks) => {
                    const allKeys = weeks.map(w => `${term}_${w}`);
                    const allSelected = allKeys.every(k => selectedFilters.includes(k));
                    setSelectedFilters(prev => allSelected ? prev.filter(k => !allKeys.includes(k)) : [...new Set([...prev, ...allKeys])]);
                };

                const startGame = () => {
                    if (selectedFilters.length === 0) { alert("請選擇範圍"); return; }
                    
                    let filtered = RAW_DATA.filter(item => {
                        const matchWeek = item.weeks.some(w => selectedFilters.includes(`${item.term}_${w}`));
                        const matchType = (gameType === 'wordsearch' || gameType === 'hangman') ? true : item.type === contentType;
                        return matchWeek && matchType;
                    });

                    if (filtered.length === 0) { alert("所選範圍無資料"); return; }
                    
                    filtered = filtered.sort(() => Math.random() - 0.5);
                    
                    if (gameType === 'matching') {
                        let flat = [];
                        filtered.forEach(q => q.answers.forEach(a => flat.push({ id: q.id + '-' + a.word, word: a.word, def: a.def })));
                        setQuestions(flat);
                    } else if (gameType === 'wordsearch') {
                         if (filtered.length > 8) filtered = filtered.slice(0, 8);
                        let wordsToFind = [];
                        filtered.forEach(q => q.answers.forEach(a => wordsToFind.push(a)));
                        setQuestions(wordsToFind.slice(0, 8)); 
                    } else {
                        setQuestions(filtered);
                    }
                    setStep('game');
                };

                return (
                    <div className="min-h-screen flex flex-col items-center py-8 px-4 max-w-4xl mx-auto">
                        <header className="mb-4 text-center">
                            <h1 className="text-3xl font-extrabold text-blue-800 mb-2">英文複習測驗系統</h1>
                            <p className="text-gray-600 font-medium">114學年度 (114-1 & 114-2)</p>
                        </header>
                        <div className="w-full bg-white rounded-xl shadow-lg p-6 min-h-[400px]">
                            {step === 'mode_select' && <ModeSelectScreen onSelect={handleModeSelect} />}
                            
                            {step === 'content_select' && <ContentTypeSelectScreen gameType={gameType} onSelect={handleContentTypeSelect} onBack={() => setStep('mode_select')} />}
                            
                            {step === 'week_select' && <WeekSelectionScreen gameType={gameType} contentType={contentType} rawData={RAW_DATA} selectedFilters={selectedFilters} onToggleFilter={toggleFilter} onToggleTerm={toggleTermAll} onStart={startGame} onBack={() => setStep(gameType === 'dictation' || gameType === 'matching' ? 'content_select' : 'mode_select')} />}

                            {step === 'game' && gameType === 'dictation' && <PhonicsGame questions={questions} voiceURI={selectedVoiceURI} onFinish={(s, m) => { setScoreData({ correct: s, total: questions.length, mistakes: m }); setStep('result'); }} onExit={() => setStep('mode_select')} />}
                            
                            {step === 'game' && gameType === 'matching' && <VocabGame pairList={questions} onFinish={(s, m) => { setScoreData({ correct: s, total: questions.length, mistakes: m }); setStep('result'); }} onExit={() => setStep('mode_select')} />}
                            
                             {step === 'game' && gameType === 'wordsearch' && <WordSearchGame words={questions} onFinish={(s, m) => { setScoreData({ correct: s, total: 100, mistakes: m }); setStep('result'); }} onExit={() => setStep('mode_select')} />}

                            {step === 'game' && gameType === 'hangman' && <HangmanGame words={questions} onFinish={(s, m) => { setScoreData({ correct: s, total: questions.length, mistakes: m }); setStep('result'); }} onExit={() => setStep('mode_select')} />}

                            {step === 'result' && <ResultView data={scoreData} mode={gameType === 'dictation' ? `聽寫 - ${contentType === 'phonics' ? 'Phonics' : contentType === 'vocabulary' ? 'Vocabulary' : ''}` : gameType === 'matching' ? `連連看 - ${contentType === 'phonics' ? 'Phonics' : contentType === 'vocabulary' ? 'Vocabulary' : ''}` : gameType} onRestart={() => setStep('mode_select')} />}
                        </div>
                    </div>
                );
            };

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
            
        } catch (err) {
            log(`Critical Init Error: ${err.message}`, 'error');
        }
    </script>
</body>
</html>
